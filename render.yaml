services:
  - type: web
    name: icd10-mcp
    runtime: python
    buildCommand: pip install -e .
    startCommand: python -m icd10_mcp.server --http
    healthCheckPath: /health
    plan: free

    envVars:
      - key: PINECONE_API_KEY
        sync: false

      - key: OPENROUTER_API_KEY
        sync: false

      - key: PINECONE_INDEX_NAME
        value: icd10cm-2026

      - key: PINECONE_NAMESPACE
        value: icd10cm_2026

      - key: PLANNER_MODEL
        value: openai/gpt-4o-mini

      - key: SELECTOR_MODEL
        value: openai/gpt-4o-mini

      - key: EMBED_MODEL
        value: openai/text-embedding-3-small